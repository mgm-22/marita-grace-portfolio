<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M. Grace Moog | Main</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ocean: #0e76b0; --gold: #e3bb06; --pink-bold: #ff5f8c;
            --dark-bg: #1e1e1e; --white: #ffffff;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--dark-bg); color: var(--white); overflow-x: hidden; }
        
        /* Neon RGB Header */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 10%; position: fixed; width: 100%; top: 0; background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(15px); z-index: 1000; box-sizing: border-box; }
        nav::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); background-size: 400%; animation: neonFlow 15s linear infinite; }
        @keyframes neonFlow { 0% { background-position: 0% 0%; } 100% { background-position: 400% 0%; } }
        
        .logo { font-weight: 800; color: var(--ocean); text-transform: uppercase; text-decoration: none; font-size: 1.1rem; }
        .nav-links a { margin-left: 35px; color: #ccc; font-weight: 700; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.2px; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--pink-bold); }

        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; }
        .shape { position: absolute; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.3; animation: float 12s infinite alternate ease-in-out; }
        @keyframes float { from { transform: translate(0, 0); } to { transform: translate(40px, 40px); } }

        h1 { font-size: 5rem; letter-spacing: -4px; margin: 0; line-height: 0.9; }
        .tagline { font-size: 1rem; color: var(--gold); font-weight: 800; margin-top: 20px; text-transform: uppercase; letter-spacing: 3px; }
        
        .featured-box { background: rgba(40, 40, 40, 0.8); border: 2px solid #444; border-radius: 30px; padding: 50px; max-width: 800px; margin-top: 60px; text-align: left; transition: 0.4s; }
        .featured-box:hover { box-shadow: 15px 15px 0px var(--ocean); transform: translate(-5px, -5px); border-color: var(--pink-bold); }
        .btn { background: var(--ocean); color: white; padding: 16px 30px; border-radius: 12px; font-weight: 700; text-decoration: none; display: inline-block; margin-top: 20px; text-transform: uppercase; font-size: 0.85rem; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">M. Grace Moog</a>
        <div class="nav-links">
            <a href="index.html" class="active">Main</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="connect.html">Connect</a>
        </div>
    </nav>
    <section class="hero">
        <div class="shape" style="width: 500px; height: 500px; top: -100px; right: -50px; background: var(--ocean);"></div>
        <h1>Marita Grace<br>G. Moog</h1>
        <p class="tagline">Statistics • Data Analytics • Strategic Systems</p>
        <div class="featured-box">
            <h2 style="color:var(--ocean); margin-top:0;">Top Technical Work</h2>
            <p style="color:#ccc; line-height:1.6;"><strong>Video Game Market Dashboard:</strong> Interactive market intelligence built with Python and Streamlit, featuring high-fidelity Plotly visualizations.</p>
            <a href="https://video-game-dashboard-ge4ljivpdjsrccdkfjpj2f.streamlit.app/" target="_blank" class="btn">Launch Dashboard</a>
        </div>
    </section>
</body>
</html>
