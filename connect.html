<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marita Grace G. Moog | Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --ocean: #0e76b0; --gold: #e3bb06; --pink-bold: #ff5f8c;
            --dark-bg: #1e1e1e; --white: #ffffff; --footer-bg: #262626;
        }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--dark-bg); color: var(--white); display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { display: flex; justify-content: flex-end; align-items: center; padding: 25px 10%; position: fixed; width: 100%; top: 0; left: 0; background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(15px); z-index: 1000; box-sizing: border-box; }
        nav::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); background-size: 400%; animation: neonFlow 15s linear infinite; }
        
        .nav-links a { margin-left: 35px; color: #ccc; font-weight: 700; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.2px; }
        .nav-links a:hover, .nav-links a.active { color: var(--pink-bold); }

        .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; max-width: 700px; margin: 0 auto; padding: 100px 20px; }
        h1 { font-size: 4.5rem; letter-spacing: -3px; margin-bottom: 10px; }
        p { font-size: 1.1rem; color: var(--ocean); font-weight: 600; margin-bottom: 50px; text-transform: uppercase; letter-spacing: 2px; }
        
        .connect-btns { display: flex; gap: 20px; }
        .btn { background: var(--ocean); color: white; padding: 18px 35px; border-radius: 12px; font-weight: 700; text-decoration: none; text-transform: uppercase; font-size: 0.9rem; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .btn-pink { background: var(--pink-bold); }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.4); opacity: 0.9; }

        footer { background: var(--footer-bg); width: 100%; padding: 50px 10%; text-align: center; border-top: 1px solid #333; position: relative; box-sizing: border-box; }
        footer::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, #ff0000, #002bff, #ff00c8); opacity: 0.3; }
        .footer-socials { margin-bottom: 20px; }
        .footer-socials a { color: var(--white); margin: 0 15px; font-size: 1.5rem; transition: 0.3s; }
        .footer-socials a:hover { color: var(--pink-bold); }
        .footer-info { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
    </style>
</head>

            <a href="mailto:mgmoog@mymail.mapua.edu.ph" class="btn btn-pink"><i class="fas fa-envelope"></i> Email Me</a>

        <div class="footer-info">
